<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue-deep: #0a2d6e;
    --blue-main: #1452b8;
    --blue-mid: #1e6fe0;
    --blue-light: #3d8ef5;
    --blue-pale: #dbeafe;
    --gold: #f0a500;
    --gold-light: #fef3c7;
    --red-soft: #fee2e2;
    --red: #dc2626;
    --green-soft: #dcfce7;
    --green: #16a34a;
    --gray-50: #f8fafc;
    --gray-100: #f1f5f9;
    --gray-200: #e2e8f0;
    --gray-600: #475569;
    --gray-800: #1e293b;
    --white: #ffffff;
    --radius: 16px;
    --radius-sm: 10px;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Cairo', 'Tajawal', sans-serif;
    background: var(--white);
    color: var(--gray-800);
    direction: rtl;
    text-align: right;
    line-height: 1.75;
    font-size: 16px;
  }

  nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--gray-200);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    display: flex;
    align-items: center;
    text-decoration: none;
    font-size: 22px;
    font-weight: 900;
    color: var(--blue-deep);
    letter-spacing: -0.5px;
  }

  .logo span { color: var(--gold); }

  .nav-cta {
    background: var(--blue-main);
    color: white;
    border: none;
    padding: 10px 24px;
    border-radius: 50px;
    font-family: 'Cairo', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.2s, transform 0.15s;
  }

  .nav-cta:hover { background: var(--blue-deep); transform: translateY(-1px); }

  .hero {
    background: linear-gradient(160deg, var(--blue-deep) 0%, var(--blue-main) 55%, var(--blue-mid) 100%);
    color: white;
    padding: 80px 24px 100px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .hero::before {
    content: '';
    position: absolute;
    top: -60px; left: -60px;
    width: 400px; height: 400px;
    background: rgba(255,255,255,0.04);
    border-radius: 50%;
  }

  .hero::after {
    content: '';
    position: absolute;
    bottom: -80px; right: -40px;
    width: 300px; height: 300px;
    background: rgba(255,255,255,0.04);
    border-radius: 50%;
  }

  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.25);
    color: #93c5fd;
    padding: 6px 18px;
    border-radius: 50px;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 28px;
    letter-spacing: 0.3px;
  }

  .hero h1 {
    font-size: clamp(28px, 5vw, 52px);
    font-weight: 900;
    line-height: 1.35;
    max-width: 800px;
    margin: 0 auto 20px;
    letter-spacing: -0.5px;
  }

  .hero h1 span { color: var(--gold); }

  .hero-sub {
    font-size: clamp(15px, 2.5vw, 19px);
    color: rgba(255,255,255,0.82);
    max-width: 660px;
    margin: 0 auto 40px;
    font-weight: 400;
    line-height: 1.8;
  }

  .hero-btns {
    display: flex;
    gap: 14px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .btn-primary {
    background: var(--gold);
    color: var(--blue-deep);
    border: none;
    padding: 15px 38px;
    border-radius: 50px;
    font-family: 'Cairo', sans-serif;
    font-size: 17px;
    font-weight: 900;
    cursor: pointer;
    text-decoration: none;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 20px rgba(240,165,0,0.4);
    display: inline-block;
  }

  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(240,165,0,0.5); }

  .btn-outline {
    background: transparent;
    color: white;
    border: 2px solid rgba(255,255,255,0.4);
    padding: 13px 32px;
    border-radius: 50px;
    font-family: 'Cairo', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.2s, border-color 0.2s;
    display: inline-block;
  }

  .btn-outline:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.7); }

  .hero-visual {
    margin-top: 60px;
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
  }

  .hero-stat {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: var(--radius);
    padding: 20px 32px;
    text-align: center;
    min-width: 140px;
  }

  .hero-stat .num {
    font-size: 36px;
    font-weight: 900;
    color: var(--gold);
    display: block;
    line-height: 1;
    margin-bottom: 6px;
  }

  .hero-stat .lbl {
    font-size: 13px;
    color: rgba(255,255,255,0.75);
    font-weight: 500;
  }

  section { padding: 80px 24px; }
  .container { max-width: 1000px; margin: 0 auto; }

  .section-tag {
    display: inline-block;
    background: var(--blue-pale);
    color: var(--blue-main);
    padding: 5px 16px;
    border-radius: 50px;
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 14px;
    letter-spacing: 0.5px;
  }

  .section-tag.red { background: var(--red-soft); color: var(--red); }
  .section-tag.green { background: var(--green-soft); color: var(--green); }
  .section-tag.gold { background: var(--gold-light); color: #92400e; }

  h2 {
    font-size: clamp(24px, 4vw, 38px);
    font-weight: 900;
    color: var(--blue-deep);
    line-height: 1.3;
    margin-bottom: 14px;
    letter-spacing: -0.3px;
  }

  .section-sub {
    font-size: 17px;
    color: var(--gray-600);
    max-width: 600px;
    margin-bottom: 52px;
    line-height: 1.8;
  }

  .problem { background: var(--gray-50); }

  .problem-headline {
    font-size: clamp(17px, 3vw, 24px);
    font-weight: 700;
    color: var(--red);
    margin-bottom: 36px;
    padding: 18px 24px;
    background: var(--red-soft);
    border-radius: var(--radius-sm);
    border-right: 4px solid var(--red);
  }

  .pain-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 18px;
  }

  .pain-card {
    background: white;
    border: 1px solid var(--gray-200);
    border-radius: var(--radius);
    padding: 24px;
    display: flex;
    align-items: flex-start;
    gap: 16px;
    transition: box-shadow 0.2s, transform 0.2s;
  }

  .pain-card:hover { box-shadow: 0 6px 24px rgba(0,0,0,0.08); transform: translateY(-2px); }

  .pain-icon {
    width: 42px; height: 42px; min-width: 42px;
    background: var(--red-soft);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }

  .pain-card h3 { font-size: 15px; font-weight: 700; color: var(--gray-800); margin-bottom: 4px; }
  .pain-card p { font-size: 13px; color: var(--gray-600); line-height: 1.6; }

  .solution { background: white; }

  .solution-intro {
    background: linear-gradient(135deg, var(--blue-deep) 0%, var(--blue-main) 100%);
    color: white;
    border-radius: var(--radius);
    padding: 40px;
    margin-bottom: 40px;
    position: relative;
    overflow: hidden;
  }

  .solution-intro::after {
    content: 'DS';
    position: absolute;
    left: -10px; top: -10px;
    font-size: 120px; font-weight: 900;
    color: rgba(255,255,255,0.05);
    font-family: 'Cairo', sans-serif;
    pointer-events: none;
  }

  .solution-intro p {
    font-size: 19px; line-height: 1.75;
    color: rgba(255,255,255,0.92);
    font-weight: 500; max-width: 700px;
  }

  .benefits-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 18px;
  }

  .benefit-card {
    background: var(--blue-pale);
    border-radius: var(--radius);
    padding: 28px 24px;
    text-align: center;
    border: 1px solid #bfdbfe;
    transition: transform 0.2s;
  }

  .benefit-card:hover { transform: translateY(-3px); }

  .benefit-icon { font-size: 32px; display: block; margin-bottom: 14px; }
  .benefit-card h3 { font-size: 15px; font-weight: 700; color: var(--blue-deep); margin-bottom: 6px; }
  .benefit-card p { font-size: 13px; color: var(--blue-main); line-height: 1.6; }

  .how { background: var(--gray-50); }

  .steps-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 0;
    position: relative;
  }

  .step {
    text-align: center;
    padding: 32px 20px;
    position: relative;
  }

  .step:not(:last-child)::after {
    content: '←';
    position: absolute;
    top: 40px; left: 0;
    font-size: 24px;
    color: var(--blue-light);
    transform: translateX(-50%);
  }

  @media (max-width: 600px) { .step::after { display: none; } }

  .step-num {
    width: 52px; height: 52px;
    background: var(--blue-main);
    color: white;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; font-weight: 900;
    margin: 0 auto 16px;
    box-shadow: 0 4px 16px rgba(20,82,184,0.3);
  }

  .step h3 { font-size: 15px; font-weight: 700; color: var(--blue-deep); margin-bottom: 8px; }
  .step p { font-size: 13px; color: var(--gray-600); line-height: 1.6; }

  .results {
    background: linear-gradient(160deg, var(--blue-deep) 0%, var(--blue-main) 100%);
    color: white;
  }

  .results h2 { color: white; }
  .results .section-sub { color: rgba(255,255,255,0.75); }

  .results-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
  }

  .result-card {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: var(--radius);
    padding: 32px 20px;
    text-align: center;
  }

  .result-pct {
    font-size: 42px; font-weight: 900;
    color: var(--gold);
    display: block; margin-bottom: 10px;
  }

  .result-card h3 { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
  .result-card p { font-size: 13px; color: rgba(255,255,255,0.7); }

  .trust { background: white; }

  .trust-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
  }

  .trust-card {
    background: var(--gray-50);
    border: 1px solid var(--gray-200);
    border-radius: var(--radius);
    padding: 28px 24px;
    transition: box-shadow 0.2s, transform 0.2s;
  }

  .trust-card:hover { box-shadow: 0 6px 24px rgba(0,0,0,0.07); transform: translateY(-2px); }

  .trust-icon { font-size: 32px; margin-bottom: 14px; display: block; }
  .trust-card h3 { font-size: 15px; font-weight: 700; color: var(--blue-deep); margin-bottom: 8px; }
  .trust-card p { font-size: 13px; color: var(--gray-600); line-height: 1.65; }

  .cta-section {

    border-top: 1px solid #fde68a;
    border-bottom: 1px solid #fde68a;
    text-align: center;
